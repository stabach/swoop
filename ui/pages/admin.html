<div id="page-admin" class="page">
  <!-- SEGMENT: Back navigation row.
       Edit when changing back-button text/icon/placement. -->
  <div class="nav-row">
    <button class="btn-sm" onclick="showPage('dashboard')">← Dashboard</button>
  </div>

  <!-- SEGMENT: Page title for athlete management. -->
  <div class="dash-heading" style="margin-bottom:20px;">⚙ Athlete Management</div>

  <!-- SEGMENT: Main admin two-column area.
       Left = add athlete form, Right = athlete roster list. -->
  <div class="admin-grid">
    <!-- SEGMENT: Add New Athlete form.
         addAthlete() reads all #new-* values and inserts a record. -->
    <div class="admin-card">
      <div class="admin-title">Add New Athlete</div>
      <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="new-name" class="form-input" placeholder="First Last" /></div>
      <div class="form-group"><label class="form-label">Grade</label><select id="new-grade" class="form-input"><option value="6">6th Grade</option><option value="7">7th Grade</option><option value="8">8th Grade</option><option value="9">9th Grade</option><option value="10" selected>10th Grade</option><option value="11">11th Grade</option><option value="12">12th Grade</option></select></div>
      <div class="form-group"><label class="form-label">Sport</label><input type="text" id="new-sport" class="form-input" placeholder="Football, Basketball, etc." /></div>
      <div class="form-group"><label class="form-label">Groups (comma separated)</label><input type="text" id="new-groups" class="form-input" placeholder="Varsity, Morning, Rehab" /></div>
      <button class="btn-primary" onclick="addAthlete()">Add Athlete</button>
    </div>

    <!-- SEGMENT: Athlete roster list container.
         renderAdminList() paints cards/buttons inside #admin-athlete-list. -->
    <div class="admin-card">
      <div class="admin-title">All Athletes</div>
      <div id="admin-athlete-list"><div class="empty-state"><span class="empty-icon">⏳</span>Loading...</div></div>
    </div>
  </div>

  <!-- SEGMENT: Edit athlete panel.
       openEditAthlete() fills #edit-* fields; saveEditAthlete() persists changes. -->
  <div id="edit-panel" style="display:none;margin-top:16px;" class="admin-card">
    <div class="admin-title">Edit Athlete</div>
    <input type="hidden" id="edit-id" />
    <div class="admin-grid">
      <div class="form-group"><label class="form-label">Name</label><input type="text" id="edit-name" class="form-input" /></div>
      <div class="form-group"><label class="form-label">Grade</label><select id="edit-grade" class="form-input"><option value="6">6th</option><option value="7">7th</option><option value="8">8th</option><option value="9">9th</option><option value="10">10th</option><option value="11">11th</option><option value="12">12th</option></select></div>
      <div class="form-group"><label class="form-label">Sport</label><input type="text" id="edit-sport" class="form-input" /></div>
      <div class="form-group"><label class="form-label">Groups (comma separated)</label><input type="text" id="edit-groups" class="form-input" /></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-sm green" onclick="saveEditAthlete()">Save Changes</button>
      <button class="btn-sm" onclick="document.getElementById('edit-panel').style.display='none'">Cancel</button>
    </div>
  </div>
</div>
