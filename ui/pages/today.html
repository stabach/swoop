<div id="page-today" class="page">
  <!-- SEGMENT: Back navigation row. -->
  <div class="nav-row">
    <button class="btn-sm" onclick="showPage('dashboard')">← Dashboard</button>
  </div>

  <!-- SEGMENT: Today's page header.
       showTodayPage() sets #today-page-day and #today-page-date. -->
  <div class="today-header">
    <div>
      <div class="today-day-name" id="today-page-day">Monday</div>
      <div class="today-date-str" id="today-page-date"></div>
    </div>

    <!-- SEGMENT: TV/Display mode action button.
         showTodayPage() enables it after a workout is selected. -->
    <div class="today-header-actions">
      <div class="today-date-picker">
        <input type="date" class="date-input" id="today-workout-date" />
        <button class="btn-sm" onclick="applyTodayWorkoutDate()">Select Date</button>
      </div>
      <button class="btn-display" id="display-tv-btn" onclick="displaySelectedTodayWorkout()" disabled>Display on TV</button>
    </div>
  </div>

  <!-- SEGMENT: Today's workout panel mount point.
       showTodayPage() injects section/exercise cards into this container. -->
  <div id="today-workout-panel">
    <div class="empty-state"><span class="empty-icon">⏳</span>Loading today's workout...</div>
  </div>
</div>
