<div id="page-edit-workouts" class="page">
  <!-- SEGMENT: Back navigation row. -->
  <div class="nav-row">
    <button class="btn-sm" onclick="showPage('dashboard')">← Dashboard</button>
  </div>

  <!-- SEGMENT: Page title. -->
  <div class="dash-heading" style="margin-bottom:16px;">Edit Workouts</div>

  <!-- SEGMENT: Date-first workout editor.
       showEditWorkoutsPage() starts with a calendar and drills into one date. -->
  <div id="edit-workout-shell"></div>

  <div class="modal-overlay" id="copy-workout-modal" style="display:none;" onclick="closeCopyWorkoutModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">Copy Workout</div>
      <div id="copy-workout-summary" style="color:var(--text-main);margin-bottom:14px;line-height:1.45;"></div>
      <label class="modal-label">Copy to date</label>
      <input type="date" id="copy-workout-date" class="modal-input" />
      <div class="modal-btns">
        <button class="btn-sm green" onclick="submitCopyWorkout()">Copy Workout</button>
        <button class="btn-sm" onclick="closeCopyWorkoutModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>
